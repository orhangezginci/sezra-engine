services:
  contracts-tests:
    build:
      context: .
      dockerfile: docker/contracts-tests.Dockerfile
    # Live-Mounts, damit Aenderungen an Schema/Tests ohne Rebuild
    # sofort wirksam werden - CMD im Dockerfile bleibt der Fallback
    # fuer den Fall, dass ohne Mount gebaut/ausgefuehrt wird.
    volumes:
      - ./contracts:/app/contracts:ro
      - ./tests/contracts:/app/tests/contracts:ro

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"  # Management-UI, nur fuer lokale Entwicklung
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"  # nur fuer lokale Entwicklung/Debugging
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"  # nur fuer lokale Entwicklung/Debugging
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama-model-pull:
    build:
      context: .
      dockerfile: infra/ollama-model-pull/Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
      OLLAMA_MODELS_TO_PULL: "nomic-embed-text,qwen3:14b"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"  # REST-API, nur fuer lokale Entwicklung/Debugging
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  json-adapter-service:
    build:
      context: .
      dockerfile: services/json-adapter-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JSON_ADAPTER_INBOX_DIR: /data/json-inbox
      # Hart verdrahtet pro Adapter-Instanz (siehe Diskussion zu
      # project_id im Envelope) - kein dynamisches Projekt-Konzept,
      # noch keine project-service-API.
      SEZRA_PROJECT_ID: ${SEZRA_PROJECT_ID}
    volumes:
      - ./data/json-inbox:/data/json-inbox

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

  persistence-migrations:
    build:
      context: .
      dockerfile: infra/persistence-migrations/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  persistence-service:
    build:
      context: .
      dockerfile: services/persistence-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      persistence-migrations:
        condition: service_completed_successfully
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  knowledge-service:
    build:
      context: .
      dockerfile: services/knowledge-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

  vectorizing-service:
    build:
      context: .
      dockerfile: services/vectorizing-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama-model-pull:
        condition: service_completed_successfully
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text

  deviation-detector-service:
    build:
      context: .
      dockerfile: services/deviation-detector-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      DETECTOR_MIN_HISTORY_SIZE: 5
      DETECTOR_MAX_HISTORY_SIZE: 100
      DETECTOR_STDDEV_MULTIPLIER: 2.0

  analyzer-service:
    build:
      context: .
      dockerfile: services/analyzer-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama-model-pull:
        condition: service_completed_successfully
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      LLM_PROVIDER: ${LLM_PROVIDER}
      OLLAMA_GENERATION_MODEL: qwen3:14b
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_GENERATION_MODEL: ${OPENAI_GENERATION_MODEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_GENERATION_MODEL: ${GEMINI_GENERATION_MODEL}
      ANALYZER_SEARCH_LIMIT: 5
      ANALYZER_CONFIDENCE_THRESHOLD: 0.5

  api-service:
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      persistence-migrations:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SEZRA_PROJECT_ID: ${SEZRA_PROJECT_ID}

volumes:
  postgres-data:
  ollama-data:
  qdrant-data: