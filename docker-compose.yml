services:
  contracts-tests:
    build:
      context: .
      dockerfile: docker/contracts-tests.Dockerfile
    # Live-Mounts, damit Aenderungen an Schema/Tests ohne Rebuild
    # sofort wirksam werden - CMD im Dockerfile bleibt der Fallback
    # fuer den Fall, dass ohne Mount gebaut/ausgefuehrt wird.
    volumes:
      - ./contracts:/app/contracts:ro
      - ./tests/contracts:/app/tests/contracts:ro

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"  # Management-UI, nur fuer lokale Entwicklung
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 10

  json-adapter-service:
    build:
      context: .
      dockerfile: services/json-adapter-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      JSON_ADAPTER_INBOX_DIR: /data/json-inbox
    volumes:
      - ./data/json-inbox:/data/json-inbox

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}